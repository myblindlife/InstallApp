<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Spectra</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">App Spectra</div>

        <div class="searchitem">
            <input
                type="search"
                id="search"
                placeholder="Search app..."
            >
            <button id="searchbutton">
                Search
            </button>
        </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#app">Apps</a></li>
            <li><a href="#download">Sing</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Welcome to App Spectra</h1>
        <p>Fast • Secure • Lightweight Android Apps</p>

    </section>

    <!-- App Section -->
    <section id="app" class="appshow">

        <h2>Our Apps</h2>

        <div class="app-card">

            <img src="my_app.png" alt="App Icon">

            <h3>My App</h3>

            <p>
                Fast, Secure and Lightweight Android App.
            </p>

            <a href="myapp.apk"
               download
               class="download-app-btn">

                Download APK

            </a>

        </div>

    </section>

    <!-- Contact -->
    <section id="contact" class="section">
        <h2>Contact</h2>
        <p>Email: yourmail@gmail.com</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 App Spectra. All rights reserved.</p>
    </footer>

</body>
</html>
